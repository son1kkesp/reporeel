<!DOCTYPE html>
<html
  lang="es"
  data-composition-variables='[
    {"id":"repoName","type":"string","label":"Nombre del repo","default":"react"},
    {"id":"installCmd","type":"string","label":"Comando instalacion","default":"npm install react"}
  ]'
>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />
  <script src="../assets/vendor/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #cta {
      font-family: "Space Grotesk", system-ui, sans-serif;
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #07090d;
    }
    #cta .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(60% 40% at 50% 42%, #1a1f3a 0%, rgba(7, 9, 13, 0) 70%),
        radial-gradient(90% 50% at 50% 100%, #221634 0%, rgba(7, 9, 13, 0) 60%);
    }
    #cta .wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
      text-align: center;
    }
    #cta .lead {
      font-size: 50px;
      font-weight: 500;
      color: #8b949e;
      opacity: 0;
      margin-bottom: 18px;
    }
    #cta .repo {
      font-size: 130px;
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      opacity: 0;
      background: linear-gradient(90deg, #58a6ff, #a371f7, #f778ba);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    #cta .cmd-pill {
      margin-top: 56px;
      font-family: "JetBrains Mono", monospace;
      font-size: 40px;
      color: #c9d6ee;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 24px 44px;
      opacity: 0;
      max-width: 880px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #cta .cmd-pill .prompt { color: #3fb950; }
    #cta .watermark {
      position: absolute;
      bottom: 130px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0;
    }
    #cta .watermark .brand {
      background: linear-gradient(90deg, #58a6ff, #a371f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    #cta .watermark .by { color: #6e7681; font-weight: 500; }
    #cta .bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 10px;
      background: linear-gradient(90deg, #58a6ff, #a371f7, #f778ba);
    }
  </style>
</head>
<body>
  <div
    id="cta"
    data-composition-id="cta"
    data-width="1080"
    data-height="1920"
  >
    <div class="bg"></div>
    <div class="wrap">
      <div class="lead" id="lead">Clónalo. Pruébalo.</div>
      <div class="repo" id="repo">repo</div>
      <div class="cmd-pill" id="pill"><span class="prompt">$ </span><span id="cmd">npm install</span></div>
    </div>
    <div class="watermark" id="watermark">
      <span class="brand">reporeel.cronhaus.dev</span> <span class="by">· by Cronhaus</span>
    </div>
    <div class="bar" id="bar"></div>
  </div>

  <script>
    (function () {
      var root = document.querySelector('#cta');
      var vars = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {};

      var repoName = String(vars.repoName || "repo").slice(0, 40);
      var cmd = String(vars.installCmd || ("git clone " + repoName)).slice(0, 80);
      root.querySelector("#repo").textContent = repoName;
      root.querySelector("#cmd").textContent = cmd;

      var tl = gsap.timeline({ paused: true });

      tl.fromTo("#lead", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.1);
      tl.fromTo("#repo",
        { opacity: 0, y: 50, scale: 0.85 },
        { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.6)" }, 0.4);
      tl.fromTo("#pill", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.95);
      tl.fromTo("#watermark", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 1.3);

      tl.to("#repo", { scale: 1.025, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.7);

      tl.fromTo("#bar", { width: "0%" }, { width: "100%", duration: 2.6, ease: "none" }, 0.1);

      tl.set({}, {}, 3.0);

      window.__timelines = window.__timelines || {};
      window.__timelines["cta"] = tl;
    })();
  </script>
</body>
</html>
